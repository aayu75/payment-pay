<!DOCTYPE html>
<html>
<head>
  <title>UPI Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 340px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .amount-btns button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #eee;
    }

    .amount-btns button.active {
      background: #667eea;
      color: white;
    }

    .pay-btn {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .pay-btn:hover {
      background: #218838;
    }

    .qr {
      margin-top: 15px;
    }

    img {
      border-radius: 10px;
      max-width: 100%;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>UPI Payment</h2>

  <div class="amount-btns">
    <button onclick="setAmount(500, this)">₹500</button>
    <button onclick="setAmount(750, this)">₹750</button>
    <button onclick="setAmount(1000, this)">₹1000</button>
  </div>

  <input type="number" id="amount" placeholder="Enter ₹500–₹1000">

  <select id="person" onchange="checkOther()">
    <option value="">Who is paying?</option>
    <option value="Mama">Mama</option>
    <option value="Bhaiya">Bhaiya</option>
    <option value="Other">Other</option>
  </select>

  <input type="text" id="otherName" placeholder="Enter name" style="display:none;">

  <button class="pay-btn" onclick="pay()">Pay Now</button>

  <div class="qr">
    <p>Or scan QR:</p>
    <img src="your-qr.png" width="200">
    <p><b>UPI ID:</b> ayushkumar7832-1@okaxis</p>
  </div>
</div>

<script>
function setAmount(val, btn) {
  document.getElementById("amount").value = val;

  document.querySelectorAll(".amount-btns button")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
}

function checkOther() {
  let person = document.getElementById("person").value;

  document.getElementById("otherName").style.display =
    person === "Other" ? "block" : "none";
}

function pay() {
  let amt = parseFloat(document.getElementById("amount").value);
  let person = document.getElementById("person").value;
  let other = document.getElementById("otherName").value;

  // Validation
  if (!amt) {
    alert("Enter amount");
    return;
  }

  if (amt < 500 || amt > 1000) {
    alert("Enter ₹500–₹1000");
    return;
  }

  if (!person) {
    alert("Select who is paying");
    return;
  }

  if (person === "Other" && !other) {
    alert("Enter name");
    return;
  }

  let name = person === "Other" ? other : person;
  let note = `Payment from ${name}`;

  let upi = `upi://pay?pa=ayushkumar7832-1@okaxis&pn=Ayush&am=${amt}&cu=INR&tn=${encodeURIComponent(note)}`;

  // Open UPI app
  window.location.href = upi;

  // Ask before WhatsApp
  setTimeout(() => {
    if (confirm("Did you complete the payment?")) {
      let msg = `Hi, I have paid ₹${amt} (${name})`;
      window.open(`https://wa.me/919971294683?text=${encodeURIComponent(msg)}`);
    }
  }, 3000);
}
</script>

</body>
</html>
