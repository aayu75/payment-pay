<!DOCTYPE html>
<html>
<head>
  <title>UPI Payment</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 340px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h2 {
      margin-bottom: 15px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .amount-btns button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #eee;
    }
    .amount-btns button.active {
      background: #667eea;
      color: white;
    }
    .pay-btn {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .qr {
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card" id="mainCard">
  <h2>UPI Payment</h2>

  <div class="amount-btns">
    <button onclick="setAmount(500, this)">₹500</button>
    <button onclick="setAmount(750, this)">₹750</button>
    <button onclick="setAmount(1000, this)">₹1000</button>
  </div>

  <input type="number" id="amount" placeholder="Enter ₹500–₹1000">

  <select id="person" onchange="checkOther()">
    <option value="">Who is paying?</option>
    <option value="Mama">Mama</option>
    <option value="Bhaiya">Bhaiya</option>
    <option value="Other">Other</option>
  </select>

  <input type="text" id="otherName" placeholder="Enter name" style="display:none;">

  <button class="pay-btn" onclick="pay()">Pay Now</button>

  <div class="qr" id="qrBox">
    <p>Or scan QR:</p>
    <img id="qrImg" width="200">
  </div>
</div>

<script>
function setAmount(val, btn) {
  document.getElementById("amount").value = val;

  document.querySelectorAll(".amount-btns button")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
}

function checkOther() {
  let person = document.getElementById("person").value;
  document.getElementById("otherName").style.display =
    person === "Other" ? "block" : "none";
}

function pay() {
  let amt = document.getElementById("amount").value;
  let person = document.getElementById("person").value;
  let other = document.getElementById("otherName").value;

  if (amt < 500 || amt > 1000) {
    alert("Enter ₹500–₹1000");
    return;
  }

  if (!person) {
    alert("Select who is paying");
    return;
  }

  let name = person === "Other" ? other : person;

  if (person === "Other" && !other) {
    alert("Enter name");
    return;
  }

  let note = `Payment from ${name}`;
  let upi = `upi://pay?pa=yourupi@bank&pn=Ayush&am=${amt}&cu=INR&tn=${encodeURIComponent(note)}`;

  // Open UPI app
  window.location.href = upi;

  // Show QR fallback
  let qr = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upi)}`;
  document.getElementById("qrImg").src = qr;
  document.getElementById("qrBox").style.display = "block";

  // Success alert
  setTimeout(() => {
    alert("After payment, please confirm on WhatsApp ✅");
  }, 2000);
}
</script>

</body>
</html>
